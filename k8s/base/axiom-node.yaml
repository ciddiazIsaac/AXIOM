# ──────────────────────────────────────────────────────────────────────────────
# axiom-node — Deployment (workers stateless)
#
# DECISIÓN DE PERSISTENCIA DEL CRDT — ver ADR-005
#   Este Deployment usa emptyDir para /data. El estado CRDT del nodo worker
#   NO se persiste en disco entre reinicios. Esto es una decisión de diseño
#   explícita, NO un descuido. Evidencia en el código:
#
#   1. axiom-p2p/src/node.rs:84
#        needs_sync: true   // seteado en cada arranque del nodo
#
#   2. axiom-p2p/src/node.rs:189 (evento mDNS) y :211 (evento Identify):
#        if self.needs_sync { self.request_full_sync(); }
#      request_full_sync() publica GossipPayload::SyncRequest al topic
#      "axiom/revocations/1.0.0"; cualquier bootnode responde con SyncResponse
#      (el estado completo Automerge serializado). Cuando merge_full() termina,
#      needs_sync = false.
#
#   3. El estado autoritativo vive en los StatefulSets con PVC:
#        axiom-bootstrap (3 réplicas × 1 Gi PVC, CRDT_DB_PATH=/data/crdt_bootstrap.db)
#      Los workers son clientes de ese estado; perder el cache local solo
#      impone el tiempo de un SyncRequest/SyncResponse al arrancar.
#
#   4. Los axiom-node son stateless por diseño de rol: no necesitan PeerId
#      estable (los bootnodes sí, por eso están en StatefulSet). El comando
#      `kubectl scale deployment axiom-node --replicas=N` escala sin fricción.
#
#   CONDICIÓN DE REVISIÓN: si el tiempo de resync supera el SLA de arranque
#   establecido en ADR-005 (por crecimiento del dataset de revocaciones), hay
#   que medir el tamaño de save_full() y evaluar migración a StatefulSet+PVC.
#
# IMAGEN:
#   El tag se inyecta desde el CI via:
#     kustomize edit set image axiom-node=ghcr.io/OWNER/axiom-node:sha-XXXXXXXX
#   El campo `image: axiom-node` es el selector que kustomization.yaml intercepta.
#   Nunca se despliega :latest en producción.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: axiom-node-headless
  labels:
    app: axiom-node
spec:
  clusterIP: None
  ports:
    - port: 3000
      name: http
    - port: 4001
      name: p2p
  selector:
    app: axiom-node
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: axiom-node
  labels:
    app: axiom-node
  annotations:
    # ── Reloader: Auto-reinicio de los pods si la CA o los certs de hoja cambian ──
    secret.reloader.stakater.com/reload: "redis-tls-secret,clickhouse-tls-secret"
spec:
  serviceName: "axiom-node-headless"
  replicas: 3
  selector:
    matchLabels:
      app: axiom-node
  template:
    metadata:
      labels:
        app: axiom-node
    spec:
      # ── Pod-level securityContext ────────────────────────────────────────────
      # 65532 = uid/gid del usuario "nonroot" de las imágenes distroless.
      # La variante gcr.io/distroless/cc-debian12 sin sufijo puede correr como
      # root (uid 0); con -nonroot o verificando el Dockerfile se garantiza 65532.
      # Aplica a todos los containers e initContainers del pod.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      initContainers:
      # ── Construir Bundle CA (System + Interno) ──────────────────────────
      # Combina el store nativo (Alpine/Debian) con la CA de cert-manager
      # en un archivo único para no perder la conectividad saliente.
      - name: ca-bundle-builder
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          apk add --no-cache ca-certificates && \
          if [ ! -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "Error: /etc/ssl/certs/ca-certificates.crt not found in base image!"
            exit 1
          fi && \
          cat /etc/ssl/certs/ca-certificates.crt /tls/redis/ca.crt > /custom-ssl/ca-bundle.crt
        volumeMounts:
        - name: redis-tls
          mountPath: /tls/redis
          readOnly: true
        - name: custom-ssl
          mountPath: /custom-ssl
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: axiom-node
        # Kustomize reemplaza este tag con sha-XXXXXXXX via `images:` en kustomization.yaml
        image: axiom-node:latest
        imagePullPolicy: IfNotPresent
        # ── Container-level securityContext ─────────────────────────────────────
        # readOnlyRootFilesystem: PRUEBA EN STAGING PRIMERO.
        # Si el binario o alguna librería escribe fuera de /data o /tmp,
        # el pod crasheará con "Read-only file system". Los emptyDir de /data
        # y /tmp cubren los casos esperados (CRDT cache y ficheros temporales).
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 4001
          name: p2p
        env:
        - name: REDIS_URL
          # TLS: rediss+sentinel:// — Sentinel escucha en 26380 (TLS)
          value: "rediss+sentinel://redis-sentinel:26380/mymaster/0"
        - name: REDIS_CA_CERT
          # Ruta al CA cert para verificar el servidor Redis
          value: "/tls/redis/ca.crt"
        - name: CLICKHOUSE_URL
          # TLS: https:// — ClickHouse escucha en 8443 (HTTPS)
          value: "https://clickhouse:8443/"
        - name: CLICKHOUSE_CA_CERT
          # Ruta al CA cert para verificar el servidor ClickHouse (usado por reqwest)
          value: "/tls/clickhouse/ca.crt"
        - name: SSL_CERT_FILE
          # rustls usa esta variable para confiar en la CA automáticamente.
          # Apunta al bundle fusionado por el initContainer.
          value: "/custom-ssl/ca-bundle.crt"
        - name: PORT
          value: "3000"
        - name: P2P_LISTEN_ADDR
          value: "/ip4/0.0.0.0/tcp/4001"
        - name: P2P_DIAL_ADDRS
          # Apunta a los 3 bootnodes vía sus DNS predecibles del StatefulSet headless.
          # Si uno cae, los nodos se conectan automáticamente a los otros dos.
          value: "/dns4/axiom-bootstrap-0.axiom-bootstrap/tcp/4001,/dns4/axiom-bootstrap-1.axiom-bootstrap/tcp/4001,/dns4/axiom-bootstrap-2.axiom-bootstrap/tcp/4001"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: ADMIN_TOKEN
        # ── Probes ──────────────────────────────────────────────────────────
        # readiness: el pod entra en rotación solo cuando /metrics responde 200
        # (garantiza que el servidor HTTP, el PDP y el registry de métricas
        # estén inicializados antes de recibir tráfico real).
        readinessProbe:
          httpGet:
            path: /metrics
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        # liveness: reinicia el pod si /health deja de responder 200
        # (detecta deadlocks o panics en el runtime de Tokio).
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        # ── Resources ───────────────────────────────────────────────────────
        # Basado en: binary Rust async Tokio, carga objetivo 1k RPS, PDP evalúa
        # políticas Rego (~1ms/req), propagación P2P gossipsub liviana.
        # Ajustar con `kubectl top pods` + VPA tras el primer load test en staging.
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: audit-volume
          mountPath: /audit
        - name: data-volume
          mountPath: /data
        # /tmp como emptyDir: necesario con readOnlyRootFilesystem=true.
        # Tokio y algunas libs Rust pueden escribir ficheros temporales aquí.
        - name: tmp
          mountPath: /tmp
        # ── Custom SSL CA Bundle ──────────────────────────────────────────────
        - name: custom-ssl
          mountPath: /custom-ssl
          readOnly: true
        # ── TLS certs (read-only) ─────────────────────────────────────────────
        # Montados desde los Secrets emitidos por cert-manager.
        # La ruta coincide con las env vars REDIS_CA_CERT y CLICKHOUSE_CA_CERT.
        - name: redis-tls
          mountPath: /tls/redis
          readOnly: true
        - name: clickhouse-tls
          mountPath: /tls/clickhouse
          readOnly: true
      volumes:
      - name: data-volume
        # emptyDir intencional — ver nota de persistencia del CRDT al inicio del archivo.
        emptyDir: {}
      # emptyDir para /tmp: requerido por readOnlyRootFilesystem=true.
      - name: tmp
        emptyDir: {}
      # emptyDir para el bundle CA combinado generado por el initContainer.
      - name: custom-ssl
        emptyDir: {}
      # ── TLS Secrets (emitidos por cert-manager, rotación automática) ─────────
      - name: redis-tls
        secret:
          secretName: redis-tls-secret
          defaultMode: 0444
      - name: clickhouse-tls
        secret:
          secretName: clickhouse-tls-secret
          defaultMode: 0444
  volumeClaimTemplates:
  - metadata:
      name: audit-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          # Cálculo (ADR-005): Tamaño promedio de AuditEvent (~500 bytes) 
          # × 10,000 eventos = ~5MB. 
          # Con factor de seguridad (fluctuaciones y logs Deny) y límite de K8s,
          # 1Gi es más que suficiente para garantizar persistencia local.
          storage: 1Gi
