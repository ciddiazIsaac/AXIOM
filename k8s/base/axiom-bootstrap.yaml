# Headless Service que asigna DNS predecibles a cada réplica del StatefulSet:
#   axiom-bootstrap-0.axiom-bootstrap.default.svc.cluster.local
#   axiom-bootstrap-1.axiom-bootstrap.default.svc.cluster.local
#   axiom-bootstrap-2.axiom-bootstrap.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: axiom-bootstrap
  labels:
    app: axiom-bootstrap
spec:
  clusterIP: None   # Headless: sin VIP, acceso directo por pod DNS
  ports:
    - port: 3000
      name: http
    - port: 4001
      name: p2p
  selector:
    app: axiom-bootstrap
---
# StatefulSet con 3 réplicas independientes.
# Cada pod obtiene su clave privada ed25519 del Secret axiom-bootstrap-keys,
# garantizando un PeerId estable entre reinicios y eliminando el SPOF.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: axiom-bootstrap
spec:
  serviceName: "axiom-bootstrap"   # Vincula con el headless Service de arriba
  replicas: 3
  selector:
    matchLabels:
      app: axiom-bootstrap
  template:
    metadata:
      labels:
        app: axiom-bootstrap
    spec:
      containers:
      - name: axiom-bootstrap
        image: axiom-node:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 4001
          name: p2p
        env:
        - name: REDIS_URL
          value: "redis://redis:6379/"
        - name: CLICKHOUSE_URL
          value: "http://clickhouse:8123/"
        - name: PORT
          value: "3000"
        - name: P2P_LISTEN_ADDR
          value: "/ip4/0.0.0.0/tcp/4001"
        # La clave se selecciona por índice de pod (POD_INDEX) en un initContainer.
        # Para simplificar, usamos una variable única por pod inyectando todas y
        # eligiendo la correcta via el nombre del pod (HOSTNAME termina en -0, -1, -2).
        - name: AXIOM_P2P_SECRET_KEY_0
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_0
        - name: AXIOM_P2P_SECRET_KEY_1
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_1
        - name: AXIOM_P2P_SECRET_KEY_2
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_2
        # Script que elige la clave correcta según el índice del pod StatefulSet
        command: ["/bin/sh", "-c"]
        args:
          - |
            IDX="${HOSTNAME##*-}"
            eval "export AXIOM_P2P_SECRET_KEY=\$AXIOM_P2P_SECRET_KEY_${IDX}"
            exec ./axiom-node
        - name: CRDT_DB_PATH
          value: "/data/crdt_bootstrap.db"
        volumeMounts:
        - name: data-volume
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
