# ──────────────────────────────────────────────────────────────────────────────
# axiom-bootstrap — StatefulSet (bootnodes con estado CRDT persistente en PVC)
#
# IMAGEN:
#   Usa el mismo binario que axiom-node (image: axiom-node).
#   El tag se inyecta desde el CI via:
#     kustomize edit set image axiom-node=ghcr.io/OWNER/axiom-node:sha-XXXXXXXX
#   Nunca se despliega :latest en producción.
# ──────────────────────────────────────────────────────────────────────────────
#
# Headless Service que asigna DNS predecibles a cada réplica del StatefulSet:
#   axiom-bootstrap-0.axiom-bootstrap.default.svc.cluster.local
#   axiom-bootstrap-1.axiom-bootstrap.default.svc.cluster.local
#   axiom-bootstrap-2.axiom-bootstrap.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: axiom-bootstrap
  labels:
    app: axiom-bootstrap
spec:
  clusterIP: None   # Headless: sin VIP, acceso directo por pod DNS
  ports:
    - port: 3000
      name: http
    - port: 4001
      name: p2p
  selector:
    app: axiom-bootstrap
---
# StatefulSet con 3 réplicas independientes.
# Cada pod obtiene su clave privada ed25519 del Secret axiom-bootstrap-keys,
# garantizando un PeerId estable entre reinicios y eliminando el SPOF.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: axiom-bootstrap
  annotations:
    # ── Reloader: Auto-reinicio de los pods si la CA o los certs de hoja cambian ──
    secret.reloader.stakater.com/reload: "redis-tls-secret,clickhouse-tls-secret"
spec:
  serviceName: "axiom-bootstrap"   # Vincula con el headless Service de arriba
  replicas: 3
  selector:
    matchLabels:
      app: axiom-bootstrap
  template:
    metadata:
      labels:
        app: axiom-bootstrap
    spec:
      serviceAccountName: axiom-bootstrap-sa
      # ── Pod-level securityContext ────────────────────────────────────────────
      # 1000 = uid/gid sugerido para despliegues modernos.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      # ── initContainers ──────────────────────────────────────────────────────
      initContainers:
      - name: select-p2p-key
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
          - |
            IDX="${HOSTNAME##*-}"
            eval "KEY=\$AXIOM_P2P_SECRET_KEY_${IDX}"
            echo -n "$KEY" > /keys/p2p_secret_key
        env:
        - name: AXIOM_P2P_SECRET_KEY_0
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_0
        - name: AXIOM_P2P_SECRET_KEY_1
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_1
        - name: AXIOM_P2P_SECRET_KEY_2
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: AXIOM_P2P_SECRET_KEY_2
        volumeMounts:
        - name: p2p-key
          mountPath: /keys
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
      # ── 2. Construir Bundle CA (System + Interno) ────────────────────────
      - name: ca-bundle-builder
        image: alpine:3.19
        command:
        - sh
        - -c
        - |
          apk add --no-cache ca-certificates && \
          if [ ! -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "Error: /etc/ssl/certs/ca-certificates.crt not found in base image!"
            exit 1
          fi && \
          cat /etc/ssl/certs/ca-certificates.crt /tls/redis/ca.crt > /custom-ssl/ca-bundle.crt
        volumeMounts:
        - name: redis-tls
          mountPath: /tls/redis
          readOnly: true
        - name: custom-ssl
          mountPath: /custom-ssl
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: axiom-bootstrap
        # Kustomize reemplaza este tag con sha-XXXXXXXX via `images:` en kustomization.yaml
        image: axiom-node:latest
        imagePullPolicy: IfNotPresent
        # ── Container-level securityContext ─────────────────────────────────────
        # readOnlyRootFilesystem: PRUEBA EN STAGING PRIMERO.
        # /data (PVC) y /keys (emptyDir) cubren las escrituras esperadas.
        # /tmp como emptyDir cubre ficheros temporales de Tokio/libs Rust.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        # No se usa eval ni variables de entorno dinámicas en el proceso principal.
        command: ["/bin/sh", "-c"]
        args:
          - |
            export AXIOM_P2P_SECRET_KEY="$(cat /keys/p2p_secret_key)"
            exec ./axiom-node
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 4001
          name: p2p
        env:
        - name: REDIS_URL
          # TLS: rediss+sentinel:// — Sentinel escucha en 26380 (TLS)
          value: "rediss+sentinel://redis-sentinel:26380/mymaster/0"
        - name: REDIS_CA_CERT
          value: "/tls/redis/ca.crt"
        - name: CLICKHOUSE_URL
          # TLS: https:// — ClickHouse escucha en 8443 (HTTPS)
          value: "https://clickhouse:8443/"
        - name: CLICKHOUSE_CA_CERT
          value: "/tls/clickhouse/ca.crt"
        - name: SSL_CERT_FILE
          # rustls usa esta variable para confiar en la CA automáticamente.
          # Apunta al bundle fusionado por el initContainer.
          value: "/custom-ssl/ca-bundle.crt"
        - name: PORT
          value: "3000"
        - name: P2P_LISTEN_ADDR
          value: "/ip4/0.0.0.0/tcp/4001"
        - name: CRDT_DB_PATH
          value: "/data/crdt_bootstrap.db"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: axiom-bootstrap-keys
              key: ADMIN_TOKEN
        # ── Probes ────────────────────────────────────────────────────────
        # readiness: el bootnode entra en rotación (y los workers lo dializan)
        # solo cuando /metrics responde 200 — garantiza que el gossip network
        # esté listo antes de recibir conexiones de otros peers.
        readinessProbe:
          httpGet:
            path: /metrics
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        # liveness: reinicia el pod si /health deja de responder
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        # ── Resources ─────────────────────────────────────────────────────
        # Bootnodes reciben principalmente tráfico P2P gossip + algunas
        # queries HTTP de los workers. CPU más bajo que axiom-node (no evalúan
        # Rego directamente), memoria comparable por el estado CRDT en RAM.
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: p2p-key
          mountPath: /keys
        # /tmp como emptyDir: necesario con readOnlyRootFilesystem=true.
        - name: tmp
          mountPath: /tmp
        # ── Custom SSL CA Bundle ──────────────────────────────────────────────
        - name: custom-ssl
          mountPath: /custom-ssl
          readOnly: true
        # ── TLS certs (read-only) ───────────────────────────────────────────
        - name: redis-tls
          mountPath: /tls/redis
          readOnly: true
        - name: clickhouse-tls
          mountPath: /tls/clickhouse
          readOnly: true
      volumes:
      # emptyDir efímero para el tránsito de la clave P2P seleccionada por
      # el initContainer. La clave real vive en el Secret axiom-bootstrap-keys.
      - name: p2p-key
        emptyDir: {}
      # emptyDir para /tmp: requerido por readOnlyRootFilesystem=true.
      - name: tmp
        emptyDir: {}
      # emptyDir para el bundle CA combinado generado por el initContainer.
      - name: custom-ssl
        emptyDir: {}
      # ── TLS Secrets (emitidos por cert-manager, rotación automática) ─────────
      - name: redis-tls
        secret:
          secretName: redis-tls-secret
          defaultMode: 0444
      - name: clickhouse-tls
        secret:
          secretName: clickhouse-tls-secret
          defaultMode: 0444
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
