apiVersion: v1
kind: Service
metadata:
  name: axiom-bootstrap
  labels:
    app: axiom-bootstrap
spec:
  ports:
    - port: 3000
      name: http
    - port: 4001
      name: p2p
  selector:
    app: axiom-bootstrap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axiom-bootstrap
  template:
    metadata:
      labels:
        app: axiom-bootstrap
    spec:
      containers:
      - name: axiom-bootstrap
        image: axiom-node:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 4001
          name: p2p
        env:
        - name: REDIS_URL
          value: "redis://redis:6379/"
        - name: CLICKHOUSE_URL
          value: "http://clickhouse:8123/"
        - name: PORT
          value: "3000"
        - name: P2P_LISTEN_ADDR
          value: "/ip4/0.0.0.0/tcp/4001"
        - name: CRDT_DB_PATH
          value: "/data/crdt_bootstrap.db"
        volumeMounts:
        - name: data-volume
          mountPath: /data
      volumes:
      - name: data-volume
        emptyDir: {}
