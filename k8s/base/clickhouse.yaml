# ClickHouse HA con ClickHouse Keeper (replicación 2 shards) — HTTPS habilitado
#
# Arquitectura:
#   - 3 pods ClickHouse Keeper (quorum distribuido, reemplaza ZooKeeper)
#   - 2 pods ClickHouse Server con replicación entre ellos
#   - Un ConfigMap con la configuración de cluster, macros y TLS por pod
#
# TLS:
#   - Puerto HTTP plano 8123 → deshabilitado (<http_port>-1</http_port>)
#   - Puerto HTTPS 8443 → único punto de entrada para clientes
#   - Puerto TCP nativo TLS 9440 (para replicación inter-shard si se necesita)
#   - Certificados gestionados por cert-manager → Secret: clickhouse-tls-secret
#   - CA cert en: /tls/ca.crt | Cert: /tls/tls.crt | Key: /tls/tls.key
#
# Los datos escritos en el shard-1 se replican automáticamente al shard-2
# usando las tablas ReplicatedMergeTree de ClickHouse.

# ─── 1. Headless Service para Keeper ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-keeper
  labels:
    app: clickhouse-keeper
spec:
  clusterIP: None
  ports:
    - port: 9181
      name: client
    - port: 9234
      name: raft
  selector:
    app: clickhouse-keeper

---
# ─── 2. ConfigMap: configuración de Keeper ───────────────────────────────────
# Keeper (Raft internal) queda en plano — fuera del scope de este ticket.
# El tráfico Keeper–Keeper y Server–Keeper permanece dentro del namespace
# protegido por NetworkPolicy. Upgrade a TLS Keeper es un ticket aparte.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
data:
  keeper_config.xml: |
    <clickhouse>
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <server_id from_env="KEEPER_ID"/>
        <log_storage_path>/var/lib/clickhouse-keeper/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/snapshots</snapshot_storage_path>
        <raft_configuration>
          <server>
            <id>1</id>
            <hostname>clickhouse-keeper-0.clickhouse-keeper</hostname>
            <port>9234</port>
          </server>
          <server>
            <id>2</id>
            <hostname>clickhouse-keeper-1.clickhouse-keeper</hostname>
            <port>9234</port>
          </server>
          <server>
            <id>3</id>
            <hostname>clickhouse-keeper-2.clickhouse-keeper</hostname>
            <port>9234</port>
          </server>
        </raft_configuration>
      </keeper_server>
    </clickhouse>

---
# ─── 3. StatefulSet: 3 réplicas del Keeper (quorum Raft) ─────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-keeper
spec:
  serviceName: clickhouse-keeper
  replicas: 3
  selector:
    matchLabels:
      app: clickhouse-keeper
  template:
    metadata:
      labels:
        app: clickhouse-keeper
    spec:
      initContainers:
      # Asigna el KEEPER_ID (1-indexed) según el índice del pod (0-indexed)
      - name: set-keeper-id
        image: busybox
        command: ["sh", "-c", "echo $((${HOSTNAME##*-} + 1)) > /tmp/keeper_id"]
        volumeMounts:
        - name: keeper-id
          mountPath: /tmp
      containers:
      - name: clickhouse-keeper
        image: clickhouse/clickhouse-keeper:23.8
        env:
        - name: KEEPER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 9181
          name: client
        - containerPort: 9234
          name: raft
        readinessProbe:
          tcpSocket:
            port: 9181
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 9181
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: keeper-config
          mountPath: /etc/clickhouse-keeper
        - name: keeper-data
          mountPath: /var/lib/clickhouse-keeper
        - name: keeper-id
          mountPath: /tmp
      volumes:
      - name: keeper-config
        configMap:
          name: clickhouse-keeper-config
      - name: keeper-id
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: keeper-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi

---
# ─── 4. Headless Service para ClickHouse Server ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  clusterIP: None
  ports:
    - port: 8443
      name: https
    - port: 9440
      name: tcp-tls
  selector:
    app: clickhouse

---
# ─── 5. ConfigMap: config de cluster + TLS para ClickHouse Server ─────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-cluster-config
data:
  cluster.xml: |
    <clickhouse>
      <!-- ── TLS: deshabilitar HTTP plano, habilitar HTTPS ─────────────────── -->
      <http_port>-1</http_port>          <!-- HTTP plano deshabilitado -->
      <https_port>8443</https_port>      <!-- HTTPS habilitado -->
      <tcp_port>-1</tcp_port>            <!-- TCP nativo plano deshabilitado -->
      <tcp_port_secure>9440</tcp_port_secure>  <!-- TCP nativo TLS habilitado -->

      <!-- ── Certificados TLS (montados desde clickhouse-tls-secret) ────────── -->
      <openSSL>
        <server>
          <certificateFile>/tls/tls.crt</certificateFile>
          <privateKeyFile>/tls/tls.key</privateKeyFile>
          <caConfig>/tls/ca.crt</caConfig>
          <!-- verifyMode none = TLS servidor; clientes no necesitan cert propio -->
          <verifyMode>none</verifyMode>
          <invalidCertificateHandler>
            <name>RejectCertificateHandler</name>
          </invalidCertificateHandler>
        </server>
        <client>
          <!-- Para conexiones salientes entre réplicas (replicación inter-shard) -->
          <loadDefaultCAFile>false</loadDefaultCAFile>
          <caConfig>/tls/ca.crt</caConfig>
          <verifyMode>strict</verifyMode>
          <invalidCertificateHandler>
            <name>RejectCertificateHandler</name>
          </invalidCertificateHandler>
        </client>
      </openSSL>

      <!-- ── Cluster config ─────────────────────────────────────────────────── -->
      <remote_servers>
        <axiom_cluster>
          <shard>
            <replica>
              <host>clickhouse-0.clickhouse</host>
              <port>9440</port>
              <secure>1</secure>
            </replica>
            <replica>
              <host>clickhouse-1.clickhouse</host>
              <port>9440</port>
              <secure>1</secure>
            </replica>
          </shard>
        </axiom_cluster>
      </remote_servers>

      <!-- ── ZooKeeper / Keeper ─────────────────────────────────────────────── -->
      <zookeeper>
        <node>
          <host>clickhouse-keeper-0.clickhouse-keeper</host>
          <port>9181</port>
        </node>
        <node>
          <host>clickhouse-keeper-1.clickhouse-keeper</host>
          <port>9181</port>
        </node>
        <node>
          <host>clickhouse-keeper-2.clickhouse-keeper</host>
          <port>9181</port>
        </node>
      </zookeeper>

      <!-- ── Macros por pod ─────────────────────────────────────────────────── -->
      <macros>
        <shard from_env="CH_SHARD"/>
        <replica from_env="CH_REPLICA"/>
      </macros>
    </clickhouse>

---
# ─── 6. StatefulSet: 2 réplicas de ClickHouse Server ─────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
spec:
  serviceName: clickhouse
  replicas: 2
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      initContainers:
      # Carga el init.sql una sola vez si la DB aún no existe
      # Ahora usa HTTPS (puerto 8443) con el CA cert para verificar el servidor
      - name: init-db
        image: clickhouse/clickhouse-server:23.8-alpine
        command: ["sh", "-c"]
        args:
          - |
            until clickhouse-client \
              --host 127.0.0.1 \
              --port 9440 \
              --secure \
              --query "SELECT 1" 2>/dev/null; do
              echo "Esperando a que ClickHouse arranque (TLS)..."; sleep 2;
            done
            clickhouse-client \
              --host 127.0.0.1 \
              --port 9440 \
              --secure \
              --multiquery < /docker-entrypoint-initdb.d/init.sql || true
        volumeMounts:
        - name: clickhouse-init
          mountPath: /docker-entrypoint-initdb.d
        - name: clickhouse-tls
          mountPath: /tls
          readOnly: true
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:23.8-alpine
        env:
        - name: CH_SHARD
          value: "1"
        - name: CH_REPLICA
          valueFrom:
            fieldRef:
              fieldPath: metadata.name   # clickhouse-0 o clickhouse-1
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 9440
          name: tcp-tls
        # readiness: httpGet no soporta HTTPS con CA custom → exec con curl
        # curl lee el CA cert desde /tls/ca.crt para verificar el servidor.
        readinessProbe:
          exec:
            command:
              - curl
              - -sf
              - --cacert
              - /tls/ca.crt
              - https://localhost:8443/ping
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
              - curl
              - -sf
              - --cacert
              - /tls/ca.crt
              - https://localhost:8443/ping
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: clickhouse-data
          mountPath: /var/lib/clickhouse
        - name: clickhouse-init
          mountPath: /docker-entrypoint-initdb.d
        - name: clickhouse-cluster-config
          mountPath: /etc/clickhouse-server/config.d
        - name: clickhouse-tls
          mountPath: /tls
          readOnly: true
      volumes:
      - name: clickhouse-init
        configMap:
          name: clickhouse-init-config
      - name: clickhouse-cluster-config
        configMap:
          name: clickhouse-cluster-config
      - name: clickhouse-tls
        secret:
          secretName: clickhouse-tls-secret   # emitido por cert-manager
  volumeClaimTemplates:
  - metadata:
      name: clickhouse-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
