# ──────────────────────────────────────────────────────────────────────────────
# NetworkPolicies — restricción de ingress a datastores
#
# REQUISITO: Tu CNI debe soportar NetworkPolicy (Calico, Cilium, etc.).
# Si usas kubenet básico u otro CNI que la ignora silenciosamente, estas
# policies NO tienen efecto de seguridad. Verifica con:
#   kubectl get networkpolicy
# y prueba un bloqueo real antes de darlo por cerrado.
#
# TLS: Los puertos planos (6379, 26379, 8123) han sido eliminados.
#   - Redis escucha solo en 6380 (TLS) y Sentinel en 26380 (TLS)
#   - ClickHouse escucha solo en 8443 (HTTPS) y 9440 (TCP TLS)
# ──────────────────────────────────────────────────────────────────────────────

# ── Redis: solo axiom-node, axiom-bootstrap, redis-sentinel y réplicas Redis ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-app-only
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: axiom-node
        - podSelector:
            matchLabels:
              app: axiom-bootstrap
        - podSelector:
            matchLabels:
              app: redis-sentinel
        - podSelector:
            matchLabels:
              app: redis   # replicación entre pods del propio StatefulSet
      ports:
        - port: 6380       # Redis TLS (puerto plano 6379 eliminado)
---
# ── Redis Sentinel: solo axiom-node y axiom-bootstrap pueden consultarlo ─────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-sentinel-allow-app-only
spec:
  podSelector:
    matchLabels:
      app: redis-sentinel
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: axiom-node
        - podSelector:
            matchLabels:
              app: axiom-bootstrap
        - podSelector:
            matchLabels:
              app: redis-sentinel  # sentinels se hablan entre sí
        - podSelector:
            matchLabels:
              app: redis           # redis pods consultan al sentinel en failover
      ports:
        - port: 26380      # Sentinel TLS (puerto plano 26379 eliminado)
---
# ── ClickHouse: axiom-node, axiom-bootstrap, clickhouse-keeper, réplicas CH y Grafana ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clickhouse-allow-app-only
spec:
  podSelector:
    matchLabels:
      app: clickhouse
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: axiom-node
        - podSelector:
            matchLabels:
              app: axiom-bootstrap
        - podSelector:
            matchLabels:
              app: clickhouse-keeper
        - podSelector:
            matchLabels:
              app: clickhouse   # replicación entre pods del propio StatefulSet
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 8443   # HTTPS interface (puerto HTTP plano 8123 eliminado)
        - port: 9440   # TCP nativo TLS (replicación inter-shard)
