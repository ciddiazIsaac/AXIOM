# Redis HA con Sentinel — TLS habilitado
#
# Arquitectura:
#   - 1 Master (redis-0): acepta escrituras en puerto TLS 6380
#   - 2 Replicas (redis-1, redis-2): solo lecturas, sincronizan del master vía TLS
#   - 3 Sentinels: monitorean el master y promueven una réplica si el master cae (quorum=2)
#
# TLS:
#   - Todos los puertos escuchan SOLO en TLS (--port 0 deshabilita el puerto plano)
#   - Certificados gestionados por cert-manager → Secret: redis-tls-secret
#   - Replicación entre pods también cifrada (--tls-replication yes)
#   - Clientes se conectan con rediss:// (o rediss+sentinel://)
#   - CA cert en: /tls/ca.crt | Server cert: /tls/tls.crt | Key: /tls/tls.key
#
# URL del Sentinel TLS: rediss+sentinel://redis-sentinel:26380/mymaster/0

# ─── 1. Headless Service para el StatefulSet de réplicas ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  labels:
    app: redis
spec:
  clusterIP: None
  ports:
    - port: 6380
      name: redis-tls
  selector:
    app: redis

---
# ─── 2. Service ClusterIP para el master (clientes de escritura) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  labels:
    app: redis
spec:
  ports:
    - port: 6380
      name: redis-tls
  selector:
    app: redis
    role: master

---
# ─── 3. Service ClusterIP para replicas (clientes de lectura) ────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  labels:
    app: redis
spec:
  ports:
    - port: 6380
      name: redis-tls
  selector:
    app: redis
    role: replica

---
# ─── 4. StatefulSet: Master + 2 Replicas ─────────────────────────────────────
# redis-0 arranca como master; redis-1 y redis-2 como replicas del master.
# Todo el tráfico (cliente y replicación) va cifrado en TLS.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
      # initContainer: determina si este pod es el master (índice 0) o réplica
      - name: config
        image: redis:7.2-alpine
        command: ["sh", "-c"]
        args:
          - |
            IDX="${HOSTNAME##*-}"
            if [ "$IDX" = "0" ]; then
              echo "Arrancando como MASTER (TLS)"
              echo "" > /etc/redis/redis.conf
            else
              echo "Arrancando como REPLICA TLS del master redis-0.redis-headless"
              # replicaof apunta al master en el puerto TLS 6380
              echo "replicaof redis-0.redis-headless 6380" > /etc/redis/redis.conf
              # La replicación también va cifrada
              echo "tls-replication yes" >> /etc/redis/redis.conf
            fi
        volumeMounts:
        - name: redis-config
          mountPath: /etc/redis
      containers:
      - name: redis
        image: redis:7.2-alpine
        command:
          - redis-server
          - /etc/redis/redis.conf
          # ── TLS ──────────────────────────────────────────────────────────
          - --tls-port
          - "6380"
          - --port
          - "0"                        # deshabilita el puerto plano (sin TLS)
          - --tls-cert-file
          - /tls/tls.crt
          - --tls-key-file
          - /tls/tls.key
          - --tls-ca-cert-file
          - /tls/ca.crt
          - --tls-auth-clients
          - "no"                       # TLS servidor; no mTLS (clientes no necesitan cert)
          - --tls-replication
          - "yes"                      # replicación también cifrada
          # ── Persistencia ─────────────────────────────────────────────────
          - --save
          - "60"
          - "1"
          - --appendonly
          - "yes"
          - --appendfsync
          - "everysec"
        ports:
        - containerPort: 6380
          name: redis-tls
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        - name: redis-tls
          mountPath: /tls
          readOnly: true
        readinessProbe:
          exec:
            command:
              - redis-cli
              - --tls
              - --cacert
              - /tls/ca.crt
              - -p
              - "6380"
              - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
              - redis-cli
              - --tls
              - --cacert
              - /tls/ca.crt
              - -p
              - "6380"
              - ping
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      volumes:
      - name: redis-config
        emptyDir: {}
      - name: redis-tls
        secret:
          secretName: redis-tls-secret   # emitido por cert-manager (cert-manager.yaml)
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
# ─── 5. ConfigMap del Sentinel (TLS) ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
data:
  sentinel.conf: |
    # Monitorear el master en el puerto TLS 6380
    sentinel monitor mymaster redis-0.redis-headless 6380 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1

    # TLS en el Sentinel: escucha solo en puerto TLS
    tls-port 26380
    port 0

    # Certificados del Sentinel (mismo Secret que Redis)
    tls-cert-file /tls/tls.crt
    tls-key-file /tls/tls.key
    tls-ca-cert-file /tls/ca.crt
    tls-auth-clients no
    tls-replication yes

---
# ─── 6. Service para que los clientes conecten al Sentinel (TLS) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  labels:
    app: redis-sentinel
spec:
  ports:
    - port: 26380
      name: sentinel-tls
  selector:
    app: redis-sentinel

---
# ─── 7. Deployment del Sentinel (3 pods para quorum) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      containers:
      - name: sentinel
        image: redis:7.2-alpine
        command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
        ports:
        - containerPort: 26380
          name: sentinel-tls
        volumeMounts:
        - name: sentinel-config
          mountPath: /etc/redis
        - name: redis-tls
          mountPath: /tls
          readOnly: true
        # readiness: el pod entra en rotación solo cuando el Sentinel acepta
        # conexiones TLS (puede tardar mientras detecta al master inicial).
        readinessProbe:
          exec:
            command:
              - redis-cli
              - --tls
              - --cacert
              - /tls/ca.crt
              - -p
              - "26380"
              - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
              - redis-cli
              - --tls
              - --cacert
              - /tls/ca.crt
              - -p
              - "26380"
              - ping
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        # Sentinel es muy liviano: solo heartbeats y failover ocasional.
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
      volumes:
      - name: sentinel-config
        configMap:
          name: redis-sentinel-config
      - name: redis-tls
        secret:
          secretName: redis-tls-secret   # mismo Secret que los pods Redis
