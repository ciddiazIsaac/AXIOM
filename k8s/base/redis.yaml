# Redis HA con Sentinel
#
# Arquitectura:
#   - 1 Master (redis-master-0): acepta escrituras
#   - 2 Replicas (redis-replica-0, redis-replica-1): solo lecturas, sincronizan del master
#   - 3 Sentinels: monitorean el master y promueven una réplica si el master cae (quorum=2)
#
# Los clientes se conectan al Sentinel para resolver quién es el master actual.
# En Kubernetes, el ingestor debe usar un cliente Redis con soporte Sentinel.
# URL del Sentinel: redis+sentinel://redis-sentinel:26379/mymaster/0

# ─── 1. Headless Service para el StatefulSet de réplicas ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  labels:
    app: redis
spec:
  clusterIP: None
  ports:
    - port: 6379
      name: redis
  selector:
    app: redis

---
# ─── 2. Service ClusterIP para el master (clientes de escritura) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  labels:
    app: redis
spec:
  ports:
    - port: 6379
  selector:
    app: redis
    role: master

---
# ─── 3. Service ClusterIP para replicas (clientes de lectura) ────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  labels:
    app: redis
spec:
  ports:
    - port: 6379
  selector:
    app: redis
    role: replica

---
# ─── 4. StatefulSet: Master + 2 Replicas ─────────────────────────────────────
# redis-0 arranca como master; redis-1 y redis-2 como replicas del master.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
      # initContainer: determina si este pod es el master (índice 0) o réplica
      - name: config
        image: redis:7.2-alpine
        command: ["sh", "-c"]
        args:
          - |
            IDX="${HOSTNAME##*-}"
            if [ "$IDX" = "0" ]; then
              echo "Arrancando como MASTER"
              echo "" > /etc/redis/redis.conf
            else
              echo "Arrancando como REPLICA del master redis-0.redis-headless"
              echo "replicaof redis-0.redis-headless 6379" > /etc/redis/redis.conf
            fi
        volumeMounts:
        - name: redis-config
          mountPath: /etc/redis
      containers:
      - name: redis
        image: redis:7.2-alpine
        command: ["redis-server", "/etc/redis/redis.conf",
                  "--save", "60", "1",          # Snapshot cada 60s si hay ≥1 cambio
                  "--appendonly", "yes",         # AOF habilitado para durabilidad máxima
                  "--appendfsync", "everysec"]   # Sync AOF cada segundo
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        # Resources ajustados para Redis 7 con AOF habilitado.
        # redis-0 (master) tiene más escrituras; redis-1/2 (replicas) menos.
        # Un solo limit sirve los 3 pods — ajustar con VPA si el master satura.
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      volumes:
      - name: redis-config
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
# ─── 5. ConfigMap del Sentinel ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
data:
  sentinel.conf: |
    sentinel monitor mymaster redis-0.redis-headless 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1

---
# ─── 6. Service para que los clientes conecten al Sentinel ───────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  labels:
    app: redis-sentinel
spec:
  ports:
    - port: 26379
      name: sentinel
  selector:
    app: redis-sentinel

---
# ─── 7. Deployment del Sentinel (3 pods para quorum) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      containers:
      - name: sentinel
        image: redis:7.2-alpine
        command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
        ports:
        - containerPort: 26379
          name: sentinel
        # readiness: el pod entra en rotación solo cuando el Sentinel acepta
        # conexiones TCP (puede tardar mientras detecta al master inicial).
        readinessProbe:
          tcpSocket:
            port: 26379
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 26379
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 3
        # Sentinel es muy liviano: solo heartbeats y failover ocasional.
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        volumeMounts:
        - name: sentinel-config
          mountPath: /etc/redis
      volumes:
      - name: sentinel-config
        configMap:
          name: redis-sentinel-config
