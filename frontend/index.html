<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXIOM — Zero Trust Architecture</title>
    <meta name="description" content="AXIOM es un sistema de control de acceso Zero Trust de alto rendimiento con evaluación de políticas OPA, detección de anomalías con IA y revocación P2P mediante CRDTs." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app">

      <!-- ═══ Login Screen ══════════════════════════════════ -->
      <div id="login-screen">
        <div class="login-card">
          <div class="login-logo">
            <div class="logo-mark">AX</div>
            <h1>AXIOM</h1>
            <p>Zero Trust Architecture</p>
          </div>

          <h2>Autenticación DID</h2>

          <div class="input-group">
            <label for="did-input">Identidad Descentralizada (DID)</label>
            <input
              type="text"
              id="did-input"
              placeholder="did:axiom:z6MkfaywSN..."
              value="did:axiom:test_42"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <button id="btn-login" class="btn-primary">
            <span>Simular Firma Ed25519</span>
            <span>→</span>
          </button>
        </div>
      </div>

      <!-- ═══ Dashboard Screen ══════════════════════════════ -->
      <div id="dashboard-screen">

        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar-logo">
            <div class="logo-badge">AX</div>
            <span>AXIOM</span>
          </div>
          <div class="topbar-identity">
            <span class="identity-dot"></span>
            <span id="current-user">—</span>
          </div>
        </header>

        <!-- Content Grid -->
        <div class="dashboard-content">

          <!-- ── Score Widget ──────────────────────────────── -->
          <section class="glass-card score-widget">
            <p class="section-title">Anomaly Score · Tiempo Real</p>
            <div class="score-ring-container">
              <div class="score-svg-wrapper">
                <svg width="140" height="140" viewBox="0 0 140 140">
                  <!-- Track -->
                  <circle
                    cx="70" cy="70" r="54"
                    fill="none"
                    stroke="rgba(148,163,184,0.1)"
                    stroke-width="10"
                  />
                  <!-- Progress -->
                  <circle
                    id="anomaly-fill"
                    cx="70" cy="70" r="54"
                    fill="none"
                    stroke="#22c55e"
                    stroke-width="10"
                    stroke-linecap="round"
                    stroke-dasharray="339.292"
                    stroke-dashoffset="339.292"
                    style="transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1), stroke 0.5s;"
                  />
                </svg>
                <div id="score-text-overlay">
                  <span id="anomaly-score">—</span>
                  <span class="score-label">Riesgo</span>
                </div>
              </div>
              <div id="anomaly-details" class="metric-badge badge-loading">
                Conectando al servidor...
              </div>
            </div>
            <div id="metric-meta"></div>
          </section>

          <!-- ── Access Control Panel ─────────────────────── -->
          <section class="glass-card access-panel">
            <p class="section-title">Consola de Control de Acceso · Política Zero Trust</p>

            <div class="resource-grid">
              <button id="btn-resource-public" class="resource-btn">
                <span class="resource-icon">📄</span>
                <span class="resource-name">Documentos Públicos</span>
                <span class="resource-class class-public">PUBLIC</span>
              </button>
              <button id="btn-resource-restricted" class="resource-btn">
                <span class="resource-icon">🔒</span>
                <span class="resource-name">Reportes Internos</span>
                <span class="resource-class class-restricted">RESTRICTED</span>
              </button>
              <button id="btn-resource-secret" class="resource-btn">
                <span class="resource-icon">🔐</span>
                <span class="resource-name">Panel Admin</span>
                <span class="resource-class class-top_secret">TOP SECRET</span>
              </button>
            </div>

            <div id="access-result" class="result-card">
              <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:0.85rem;">
                Selecciona un recurso para evaluar la política OPA/Rego →
              </div>
            </div>
          </section>

          <!-- ── Revocation Panel ─────────────────────────── -->
          <section class="glass-card revoke-panel">
            <p class="section-title">Revocación P2P · CRDT Automerge + Gossipsub</p>
            <div class="revoke-form">
              <div class="input-group">
                <label for="revoke-input">ID de Credencial a Revocar</label>
                <input
                  type="text"
                  id="revoke-input"
                  placeholder="vc:axiom:credential:abc123..."
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>
              <button id="btn-revoke" class="btn-danger">
                ⚡ Revocar Credencial
              </button>
              <div id="revoke-result" class="revoke-badge badge-loading" style="display:none;"></div>
            </div>
          </section>

        </div><!-- /.dashboard-content -->
      </div><!-- /#dashboard-screen -->
    </div><!-- /#app -->

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
