version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "-q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ─── Nodo 1: Nodo raíz de la red P2P ─────────────────────────────────────
  axiom-node:
    build: .
    ports:
      - "3000:3000"   # API HTTP + SPA
      - "4001:4001"   # P2P libp2p TCP
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/
      - CLICKHOUSE_URL=http://clickhouse:8123/
      - PORT=3000
      - P2P_LISTEN_ADDR=/ip4/0.0.0.0/tcp/4001

  # ─── Nodo 2: Segundo nodo para demo de descentralización P2P ─────────────
  # mDNS (habilitado en behaviour.rs) descubre axiom-node automáticamente
  # dentro de la red bridge de Docker — sin hardcodear PeerId.
  axiom-node-2:
    build: .
    ports:
      - "3002:3000"   # API HTTP + SPA (puerto externo diferente)
      - "4002:4002"   # P2P libp2p TCP
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      axiom-node:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/
      - CLICKHOUSE_URL=http://clickhouse:8123/
      - PORT=3000
      - P2P_LISTEN_ADDR=/ip4/0.0.0.0/tcp/4002

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - axiom-node

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - axiom-node
      - prometheus
      - clickhouse
